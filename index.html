<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0b10" />
    <title>오늘급식</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css?v=20260617-2" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="./app.js?v=20260617-2" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <img class="brand-mark" src="./favicon.svg" alt="" aria-hidden="true" />
          <div>
            <h1>오늘급식</h1>
            <p id="schoolLabel">한세사이버보안고등학교</p>
          </div>
        </div>

        <nav class="top-actions" aria-label="빠른 도구">
          <button class="icon-button" id="todayButton" type="button" aria-label="오늘로 이동" title="오늘">
            <i data-lucide="calendar-days" aria-hidden="true"></i>
          </button>
          <button class="icon-button" id="refreshButton" type="button" aria-label="새로고침" title="새로고침">
            <i data-lucide="refresh-cw" aria-hidden="true"></i>
          </button>
          <button class="icon-button" id="copyMenuButton" type="button" aria-label="점심 메뉴 복사" title="점심 메뉴 복사">
            <i data-lucide="copy" aria-hidden="true"></i>
          </button>
        </nav>
      </header>

      <section class="hero-workspace" aria-label="급식 대시보드">
        <div class="meal-focus">
          <div class="date-bar">
            <button class="icon-button subtle" id="prevDayButton" type="button" aria-label="이전 날짜">
              <i data-lucide="chevron-left" aria-hidden="true"></i>
            </button>
            <div>
              <p class="eyebrow" id="dayName">화요일</p>
              <h2 id="selectedDateLabel">6월 9일</h2>
              <input class="date-input" id="dateInput" type="date" aria-label="날짜 직접 선택" />
            </div>
            <button class="icon-button subtle" id="nextDayButton" type="button" aria-label="다음 날짜">
              <i data-lucide="chevron-right" aria-hidden="true"></i>
            </button>
          </div>

          <div class="status-row">
            <span class="status-pill" id="sourceStatus">나이스 확인 중</span>
            <span id="lastUpdated">KST 기준</span>
          </div>

          <div class="meal-list" id="mealList" aria-live="polite"></div>
          <p class="diet-notice">
            돼지고기 표시는 참고용입니다. 표기 누락, 육수, 조리 과정 등은 확인할 수 없어 실제 포함 여부와 다를 수 있으니 식이 제한이 있으면 급식실에 확인하세요.
          </p>
        </div>
      </section>

      <section class="week-section" aria-labelledby="weekHeading">
        <div class="section-head">
          <div>
            <p class="eyebrow">주간</p>
            <h2 id="weekHeading">이번 주 급식</h2>
          </div>
          <p id="weekRange">-</p>
        </div>
        <div class="week-stats" id="weekStats"></div>
        <div class="week-grid" id="weekGrid"></div>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </body>
</html>
